<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>帮助中心</title></head>
<body>
<h1>帮助中心</h1>
<p>欢迎使用用户管理系统！以下是常见问题的解答：</p>

<h2>如何登录？</h2>
<p>在登录页面输入您的用户名和密码即可登录。如果您还没有账号，请先注册。</p>

<h2>如何注册？</h2>
<p>点击导航栏的"注册"链接，填写用户名、密码、邮箱和手机号即可完成注册。</p>

<h2>如何充值？</h2>
<p>登录后进入"个人中心"，在充值区域输入金额并点击充值按钮。</p>

<h2>如何上传头像？</h2>
<p>登录后点击导航栏的"上传头像"，选择图片文件上传即可。</p>

<h2>如何搜索用户？</h2>
<p>登录后首页有搜索框，输入用户名或邮箱关键词即可搜索。</p>

<hr>
<p><em>如有其他问题，请联系管理员。</em></p>
</body>
</html>
